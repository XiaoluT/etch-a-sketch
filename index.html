<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="control">
        <label for="gridSizeInput">
            Grid Size (1-100):
        </label>

        <input type="number" id="gridSizeInput" min="1" max="100" placeholder="1-100">

        <button id="resizeBtn">Resize Grid</button>
    </div>

    <div class="colorModes">
        <button id="blackBtn" class="modeBtn">Black</button>
        <button id="rainbowBtn" Class="modeBtn">Rainbow</button>
        <button id="darkenBtn" class="modeBtn">Darken</button>
        <button id="colorModeBtn" class="modeBtn" data-mode="color">Color Mode</button>

        <div id="colorPalette" class="hidden">
            <button class="color-btn" data-color="red">red</button>
            <button class="color-btn" data-color="yellow">Yellow</button>
            <button class="color-btn" data-color="blue">Blue</button>
            <button class="color-btn" data-color="green">Green</button>
            <button class="color-btn" data-color="purple">Purple</button>

            <input type="color" id="customColorPicker" value="#000000">
        </div>

    </div>

    <button id="eraserBtn" class="modeBtn">Eraser</button>

    <button id="clearBtn">Clear Grid</button>

    <div id="modalOverlay" class="hidden">
        <div id="modal">
            <h3>Clear Grid?</h3>
            <p>This will remove all colors from the grid.</p>
            <div class="modal-buttons">
                <button id="cancelBtn">Cancel</button>
                <button id="confirmClearBtn">Clear</button>
            </div>
        </div>
    </div>

    <div id="container"></div>

    <script src="script.js"></script>

</body>

</html>
