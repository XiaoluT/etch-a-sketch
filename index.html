<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Etch-a-Sketch</h1>
    <p>Draw by clicking and dragging.</p>

    <div class="toolbar">

        <!-- Grid Controls -->
        <div class="toolbar-group">
            <label for="gridSizeInput">
                Grid Size (1-100):
            </label>

            <input type="number" id="gridSizeInput" min="1" max="100" placeholder="1-100">

            <button id="resizeBtn" class="btn">Resize Grid</button>
        </div>

        <!-- Drawing Tools -->
        <div class="toolbar-group">
            <button id="blackBtn" class="modeBtn">Black</button>
            <button id="rainbowBtn" class="modeBtn">Rainbow</button>
            <button id="darkenBtn" class="modeBtn">Darken</button>


            <button id="colorModeBtn" class="modeBtn" data-mode="color">Color Mode</button>

            <!-- Color Palette(grouped) -->
            <div id="colorPalette" class="hidden palatte">
                <button class="color-btn" data-color="red"></button>
                <button class="color-btn" data-color="yellow"></button>
                <button class="color-btn" data-color="blue"></button>
                <button class="color-btn" data-color="green"></button>
                <button class="color-btn" data-color="purple"></button>

                <input type="color" id="customColorPicker" class="color-picker" value="#000000">
            </div>

            <button id="eraserBtn" class="modeBtn">Eraser</button>
        </div>

        <!-- Utilities -->
        <div class="toolbar-group">
            <button id="clearBtn" class="btn danger">Clear Grid</button>
            <button id="saveBtn" class="btn success">Save PNG</button>
        </div>

    </div>

    <!-- Modal -->

    <div id="modalOverlay" class="hidden modal-overlay">
        <div id="modal" class="modal">
            <h3>Clear Grid?</h3>
            <p>This will remove all colors from the grid.</p>

            <div class="modal-buttons">
                <button id="cancelBtn" class="btn">Cancel</button>
                <button id="confirmClearBtn" class="btn danger">Clear</button>
            </div>
        </div>
    </div>

    <!-- Grid -->

    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
