<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Etch-a-Sketch</h1>
    <p>Draw by clicking and dragging.</p>

    <div class="toolbar">
        <div class="control">
            <label for="gridSizeInput">
                Grid Size (1-100):
            </label>

            <input type="number" id="gridSizeInput" min="1" max="100" placeholder="1-100">

            <button id="resizeBtn">Resize Grid</button>
        </div>


        <div class="toolButtons">
            <button id="blackBtn" class="modeBtn">Black</button>
            <button id="rainbowBtn" class="modeBtn">Rainbow</button>
            <button id="darkenBtn" class="modeBtn">Darken</button>


            <button id="colorModeBtn" class="modeBtn" data-mode="color">Color Mode</button>
            <button id="eraserBtn" class="modeBtn">Eraser</button>

            <button id="clearBtn">Clear Grid</button>

            <button id="saveBtn">Save PNG</button>

            <div id="colorPalette" class="hidden">
                <button class="color-btn" data-color="red"></button>
                <button class="color-btn" data-color="yellow"></button>
                <button class="color-btn" data-color="blue"></button>
                <button class="color-btn" data-color="green"></button>
                <button class="color-btn" data-color="purple"></button>


                <input type="color" id="customColorPicker" class="color-picker" value="#000000">
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="hidden">
        <div id="modal">
            <h3>Clear Grid?</h3>
            <p>This will remove all colors from the grid.</p>
            <div class="modal-buttons">
                <button id="cancelBtn">Cancel</button>
                <button id="confirmClearBtn">Clear</button>
            </div>
        </div>
    </div>

    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
